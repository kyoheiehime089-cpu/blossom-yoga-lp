name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site

          if [ -f index.html ]; then
            cp index.html _site/
          else
            echo "index.html is missing"
            exit 1
          fi

          if [ -f style.css ]; then
            cp style.css _site/
          fi

          if [ -f styles.css ]; then
            cp styles.css _site/
          fi

          if [ -f script.js ]; then
            cp script.js _site/
          fi

          if [ -d assets ]; then
            cp -r assets _site/assets
          fi

          if [ -d friends-serufu-member-booking-app ]; then
            cp -r friends-serufu-member-booking-app _site/friends-serufu-member-booking-app
          else
            echo "friends-serufu-member-booking-app is missing"
            exit 1
          fi

          if [ -d friends-serufu-member-booking-app-game-lab ]; then
            cp -r friends-serufu-member-booking-app-game-lab _site/friends-serufu-member-booking-app-game-lab
          else
            echo "friends-serufu-member-booking-app-game-lab is missing"
            exit 1
          fi

          if [ -f 404.html ]; then
            cp 404.html _site/
          fi

          if [ -f yoga-private.html ]; then
            cp yoga-private.html _site/
          fi

          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
