<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">人目を気にせず使える完全個室ジムの内観</title>
  <desc id="desc">明るく清潔な完全個室ジムの内観。誰もいない貸切空間にスミスマシン、ベンチ、ダンベル、バイクが整っている。</desc>
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#edf7f8"/></linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#dfe8eb"/><stop offset="1" stop-color="#b7c2c9"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#10233f" flood-opacity=".18"/></filter>
  </defs>
  <rect width="1200" height="700" fill="url(#wall)"/>
  <polygon points="0,500 1200,430 1200,700 0,700" fill="url(#floor)"/>
  <rect x="70" y="70" width="1060" height="500" rx="32" fill="#fff" filter="url(#shadow)"/>
  <rect x="120" y="112" width="960" height="210" rx="20" fill="#edf6f8"/>
  <g fill="#d2e3e8"><rect x="154" y="145" width="180" height="145" rx="12"/><rect x="370" y="145" width="180" height="145" rx="12"/><rect x="586" y="145" width="180" height="145" rx="12"/><rect x="802" y="145" width="180" height="145" rx="12"/></g>
  <g stroke="#fff" stroke-width="8"><line x1="244" y1="145" x2="244" y2="290"/><line x1="460" y1="145" x2="460" y2="290"/><line x1="676" y1="145" x2="676" y2="290"/><line x1="892" y1="145" x2="892" y2="290"/></g>
  <g transform="translate(170 355)" fill="none" stroke="#10233f" stroke-linecap="round" stroke-linejoin="round"><rect x="0" y="0" width="235" height="190" rx="12" stroke-width="18"/><line x1="32" y1="178" x2="203" y2="178" stroke-width="18"/><line x1="118" y1="0" x2="118" y2="190" stroke-width="10" opacity=".45"/><line x1="-22" y1="78" x2="257" y2="78" stroke-width="14"/></g>
  <g transform="translate(470 420)" fill="none" stroke="#10233f" stroke-linecap="round"><rect x="0" y="40" width="260" height="38" rx="19" fill="#10233f" stroke="none" opacity=".95"/><path d="M50 78 L20 145 M210 78 L242 145" stroke-width="16"/><path d="M92 40 V0 H168 V40" stroke-width="14"/></g>
  <g transform="translate(815 350)"><rect x="0" y="0" width="130" height="215" rx="16" fill="#10233f" opacity=".95"/><g fill="#fff" opacity=".92"><circle cx="34" cy="38" r="16"/><circle cx="96" cy="38" r="16"/><circle cx="34" cy="86" r="16"/><circle cx="96" cy="86" r="16"/><circle cx="34" cy="134" r="16"/><circle cx="96" cy="134" r="16"/></g></g>
  <g transform="translate(970 398)" fill="none" stroke="#10233f" stroke-width="13" stroke-linecap="round"><circle cx="45" cy="62" r="43"/><line x1="45" y1="105" x2="45" y2="155"/><line x1="18" y1="155" x2="72" y2="155"/></g>
  <rect x="125" y="585" width="950" height="10" rx="5" fill="#d1dde1"/>
  <text x="120" y="55" fill="#10233f" font-family="sans-serif" font-size="34" font-weight="800">完全個室・貸切予約制</text>
</svg>