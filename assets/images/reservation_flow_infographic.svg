<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img"><rect width="1200" height="700" fill="#f5fbff"/><text x="600" y="80" text-anchor="middle" font-family="sans-serif" font-size="44" font-weight="900" fill="#10233f">貸切予約制だから、後回しになりにくい</text><g font-family="sans-serif" text-anchor="middle"><rect x="90" y="170" width="290" height="330" rx="28" fill="#ffffff" stroke="#d9e4ea"/><circle cx="235" cy="250" r="54" fill="#1db5a9"/><text x="235" y="360" font-size="30" font-weight="900" fill="#10233f">1. 時間を選ぶ</text><text x="235" y="405" font-size="21" font-weight="700" fill="#51606f">空き枠から選択</text><rect x="455" y="170" width="290" height="330" rx="28" fill="#ffffff" stroke="#d9e4ea"/><circle cx="600" cy="250" r="54" fill="#f2994a"/><text x="600" y="360" font-size="30" font-weight="900" fill="#10233f">2. 予約する</text><text x="600" y="405" font-size="21" font-weight="700" fill="#51606f">運動が予定に入る</text><rect x="820" y="170" width="290" height="330" rx="28" fill="#ffffff" stroke="#d9e4ea"/><circle cx="965" cy="250" r="54" fill="#10233f"/><text x="965" y="360" font-size="30" font-weight="900" fill="#10233f">3. 貸切で使う</text><text x="965" y="405" font-size="21" font-weight="700" fill="#51606f">1組ごとに利用</text><text x="600" y="590" font-size="30" font-weight="900" fill="#10233f">行く時間を決めるから、運動を習慣にしやすい</text></g></svg>