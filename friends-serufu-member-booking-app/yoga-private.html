<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ヨガ個別予約登録 | friendsセルフ予約</title>
<link rel="stylesheet" href="./admin-style.css?v=45">
</head>
<body>
<header class="hero"><p class="eyebrow">friends セルフ予約アプリ</p><h1>ヨガ個別予約登録</h1><p>マンツーマンヨガ予約を登録すると、重なるセルフジム枠が自動で予約不可になります。</p></header>
<main class="wrap">
  <section id="loginView" class="card">
    <h2>パスコード確認</h2>
    <p class="small">パスコードを入力してください。</p>
    <div class="row">
      <input id="yogaPass" type="password" autocomplete="current-password" placeholder="パスコード">
      <button id="yogaOpen" class="btn">開く</button>
    </div>
  </section>

  <section id="yogaView" class="hidden">
    <div class="toolbar">
      <a class="ghost" href="./admin.html">管理者画面へ</a>
      <button id="reloadYoga" class="ghost">再読み込み</button>
      <button id="logoutYoga" class="danger">ログアウト</button>
    </div>

    <section class="card">
      <p class="eyebrow">予約登録</p>
      <h2>ヨガ個別予約</h2>
      <form id="yogaForm" class="mini">
        <label>日付<input name="date" type="date" required></label>
        <div class="two">
          <label>開始時間<select id="yogaStart" name="start" required></select></label>
          <label>終了時間<select id="yogaEnd" name="end" required></select></label>
        </div>
        <label>会員名（任意）<input name="memberName" placeholder="未入力でも登録できます"></label>
        <label>メモ（任意）<textarea name="note" rows="3" placeholder="未入力でも登録できます"></textarea></label>
        <p id="yogaStatus" class="notice"></p>
        <button id="yogaSubmit" class="btn">登録する</button>
      </form>
      <p class="small">開始・終了は全日10分単位です。開始時間を選ぶと終了時間は自動で40分後になりますが、必要に応じて変更できます。</p>
    </section>

    <section class="card">
      <p class="eyebrow">空き状況</p>
      <h2>その日の予約不可時間</h2>
      <p class="small">セルフジム予約は画面表示40分でも、重なり判定上の50分ブロックとして表示します。</p>
      <div id="yogaUnavailable" class="res"></div>
      <div id="yogaOpenCandidates" class="small"></div>
    </section>

    <section class="card">
      <p class="eyebrow">登録済み</p>
      <h2>ヨガ個別予約一覧</h2>
      <div id="yogaList" class="list"></div>
    </section>
  </section>
</main>

<div id="toast" class="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase-config.js?v=45"></script>
<script src="./yoga-private-v40-helper.js?v=45"></script>
<script src="./yoga-private-clean-v39.js?v=45"></script>
<script src="./yoga-save-v42.js?v=45"></script>
</body>
</html>
