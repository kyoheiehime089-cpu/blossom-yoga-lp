<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>friendsセルフ｜管理者画面</title>
<meta name="theme-color" content="#1f2a24">
<style>
:root{--bg:#f7f3ec;--card:#fffaf2;--text:#20251f;--muted:#756c61;--line:#e5d8c6;--dark:#1f2a24;--accent:#f4b43f;--danger:#b34432;--shadow:0 18px 50px rgba(31,42,36,.12)}*{box-sizing:border-box}body{margin:0;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic','Noto Sans JP',Meiryo,sans-serif;background:linear-gradient(180deg,#fff8e9,var(--bg));line-height:1.65}.wrap{width:min(1180px,calc(100% - 24px));margin:auto}.top{display:flex;justify-content:space-between;align-items:center;padding:16px 0}.brand{display:flex;gap:12px;align-items:center}.mark{display:grid;place-items:center;width:52px;height:52px;border-radius:17px;background:var(--accent);font-weight:950;font-size:24px;letter-spacing:-.08em}.brand p,.eyebrow,.small{margin:0;color:var(--muted);font-size:12px;font-weight:900;letter-spacing:.08em}.brand h1{margin:0;font-size:24px;line-height:1}.panel,.card{border:1px solid var(--line);background:rgba(255,250,242,.94);box-shadow:var(--shadow);border-radius:22px;padding:22px}.hidden{display:none!important}button,input,select{font:inherit}input,select{width:100%;border:1px solid #d8c8b4;border-radius:16px;padding:14px;background:#fffdf8;outline:none}label{display:block;margin:14px 0 8px;font-weight:900}.btn,.ghost,.danger{border:0;border-radius:16px;cursor:pointer;font-weight:950;min-height:44px}.btn{color:#1f2a24;background:linear-gradient(135deg,var(--accent),#ffd475);box-shadow:0 14px 24px rgba(200,125,21,.22)}.ghost{padding:0 14px;border:1px solid var(--line);background:#fffaf2;color:var(--dark)}.danger{padding:0 14px;background:var(--danger);color:#fff}.hero{display:grid;grid-template-columns:1fr .9fr;gap:20px;margin:10px 0 18px}.hero-copy{min-height:330px;display:flex;flex-direction:column;justify-content:flex-end;padding:36px;border-radius:22px;color:#fff;background:linear-gradient(135deg,rgba(31,42,36,.96),rgba(37,60,48,.92)),radial-gradient(circle at 80% 20%,rgba(244,180,63,.45),transparent 25rem)}.hero-copy .eyebrow{color:#ffe3a4}.hero-copy h2{font-size:clamp(34px,6vw,62px);line-height:1.05;letter-spacing:-.055em;margin:12px 0}.login{align-self:center}.row{display:grid;grid-template-columns:1fr 150px;gap:10px}.grid{display:grid;grid-template-columns:1.1fr .9fr .9fr;gap:16px}.list{display:grid;gap:12px}.res{display:grid;gap:7px;padding:16px;border:1px solid var(--line);border-radius:18px;background:#fffdf8}.res h3{margin:0}.res p{margin:0;color:var(--muted);font-size:14px}.mini{display:grid;gap:10px}.rules{margin-bottom:16px;background:#fff7e7}.notice{background:#fff3d5;border:1px solid #efcf8f}.footer{text-align:center;color:var(--muted);padding:26px 0 42px;font-weight:800}@media(max-width:900px){.hero,.grid{grid-template-columns:1fr}}@media(max-width:640px){.row{grid-template-columns:1fr}.hero-copy,.panel,.card{padding:18px}.hero-copy{min-height:auto}.hero-copy h2{font-size:38px}}
</style>
</head>
<body>
<div class="wrap">
<header class="top"><div class="brand"><div class="mark">fs</div><div><p>管理者専用</p><h1>friendsセルフ</h1></div></div><a class="ghost" style="display:inline-flex;align-items:center;text-decoration:none" href="./">会員画面へ</a></header>
<main>
<section id="loginView" class="hero"><div class="hero-copy"><p class="eyebrow">管理者画面</p><h2>会員管理と予約管理</h2><p>会員側には表示されない、管理者専用ページです。</p></div><div class="panel login"><h2>管理者ログイン</h2><p class="small">初期パスコード：1111</p><label>管理者パスコード</label><div class="row"><input id="adminPass" type="password" placeholder="パスコード"><button id="adminOpen" class="btn">開く</button></div></div></section>
<section id="adminView" class="hidden">
<div class="panel rules"><h2>現在のルール</h2><ul><li>予約枠は50分</li><li>予約可能期間は2週間先まで</li><li>同時予約は最大2枠まで</li><li>同日予約は最大2枠まで</li><li>当日予約は1時間前まで</li><li>当日キャンセルは2時間前まで</li><li>追加枠は1枠3,000円</li></ul></div>
<div class="panel notice"><h2>枠の購入希望</h2><div id="requests" class="list"></div></div>
<div id="memberDetail" class="panel hidden" style="margin-top:16px"></div>
<div class="grid" style="margin-top:16px"><section class="card"><h2>予約一覧</h2><div id="reservations" class="list"></div></section><section class="card"><h2>会員追加</h2><form id="addMember" class="mini"><input name="name" placeholder="会員名" required><input name="id" placeholder="会員番号 例：FS010" required><input name="pin" placeholder="電話番号下4桁" required><select name="plan"><option>月4回プラン</option><option>月8回プラン</option><option>ファミリー週1（月4回）</option><option>ファミリー週2（月8回）</option></select><button class="btn">会員を追加</button></form><div id="members" class="list"></div></section><section class="card"><h2>手動利用不可</h2><form id="addClosed" class="mini"><input name="date" type="date" required><select name="start" required></select><input name="reason" placeholder="理由 例：清掃"><button class="btn">利用不可にする</button></form><div id="closed" class="list"></div><button id="reset" class="danger" style="margin-top:14px;width:100%">デモデータ初期化</button></section></div>
</section>
</main><footer class="footer">friendsセルフ｜管理者専用画面</footer>
</div>
<script>
const ADMIN='1111';const K='friends-serufu-gh-v2';const D={members:[{id:'FS001',pin:'1234',name:'サンプル会員A',plan:'月4回プラン',extraSlots:0},{id:'FS002',pin:'5678',name:'サンプル会員B',plan:'月8回プラン',extraSlots:0},{id:'FS003',pin:'9999',name:'サンプル会員C',plan:'ファミリー週1（月4回）',extraSlots:0},{id:'FS004',pin:'1111',name:'サンプル会員D',plan:'ファミリー週2（月8回）',extraSlots:0}],reservations:[],closed:[],purchaseRequests:[],member:null,week:0,day:0};let S=JSON.parse(localStorage.getItem(K)||'null')||structuredClone(D);const $=q=>document.querySelector(q);function save(){localStorage.setItem(K,JSON.stringify(S))}function normalize(){S.members=(S.members||D.members).map(m=>({...m,extraSlots:Number(m.extraSlots||0),plan:m.plan==='通い放題'?'月8回プラン':m.plan==='ファミリープラン'?'ファミリー週1（月4回）':m.plan}));S.reservations=S.reservations||[];S.closed=S.closed||[];S.purchaseRequests=S.purchaseRequests||[];save()}function pad(n){return String(n).padStart(2,'0')}function dk(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}function fmtMin(m){m=Number(m);if(m===1440)return'24:00';return pad(Math.floor(m/60))+':'+pad(m%60)}function jp(s){let d=new Date(s+'T00:00:00'),w='日月火水木金土'[d.getDay()];return `${d.getMonth()+1}/${d.getDate()}（${w}）`}function full(d,m){return `${jp(d)} ${fmtMin(m)}〜${fmtMin(Number(m)+50)}`}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function member(id){return S.members.find(m=>m.id===id)}function render(){renderRequests();renderReservations();renderMembers();renderClosed()}function renderRequests(){let req=S.purchaseRequests.filter(r=>r.status==='pending');$('#requests').innerHTML=req.length?req.map(r=>`<article class='res'><h3>枠の購入希望</h3><p>${esc(r.memberName)} / 1枠 3,000円</p><p>${new Date(r.createdAt).toLocaleString('ja-JP')}</p><button class='btn' data-detail='${esc(r.memberId)}'>この会員を開く</button></article>`).join(''):'<article class="res"><p>購入希望はありません。</p></article>'}function renderReservations(){let active=S.reservations.filter(r=>!r.cancelled).sort((a,b)=>(a.date+a.start).localeCompare(b.date+b.start));$('#reservations').innerHTML=active.length?active.map(r=>`<article class='res'><h3>${esc(full(r.date,r.start))}</h3><p>${esc(r.memberName)} / ${esc(r.plan)} / ${esc(r.people)}</p><button class='danger' data-cancel='${r.id}'>管理者キャンセル</button></article>`).join(''):'<article class="res"><p>予約はまだありません。</p></article>'}function renderMembers(){S.members.forEach(m=>{if(typeof m.extraSlots==='undefined')m.extraSlots=0});$('#members').innerHTML=S.members.map(m=>`<article class='res'><h3>${esc(m.name)}</h3><p>${esc(m.id)} / ${esc(m.plan)} / PIN:${esc(m.pin)}</p><p>追加枠：${Number(m.extraSlots||0)}</p><button class='ghost' data-detail='${esc(m.id)}'>会員を開く</button></article>`).join('')}function renderClosed(){if(!S.closed.length){$('#closed').innerHTML='<article class="res"><p>利用不可枠はありません。</p></article>';return}$('#closed').innerHTML=S.closed.map(x=>`<article class='res'><h3>${esc(full(x.date,x.start))}</h3><p>${esc(x.reason||'理由なし')}</p><button class='danger' data-open='${x.id}'>解除</button></article>`).join('')}function openDetail(id){let m=member(id);if(!m)return;let pending=S.purchaseRequests.filter(r=>r.memberId===id&&r.status==='pending').length;$('#memberDetail').classList.remove('hidden');$('#memberDetail').innerHTML=`<p class='eyebrow'>会員詳細</p><h2>${esc(m.name)}</h2><p>${esc(m.id)} / ${esc(m.plan)} / 追加枠：${Number(m.extraSlots||0)}</p><p>未対応の購入希望：${pending}件</p><div class='row'><button class='btn' data-grant='${esc(id)}'>1枠提供する</button><button class='ghost' data-close-detail='1'>閉じる</button></div>`}function grantSlot(id){let m=member(id);if(!m)return;m.extraSlots=Number(m.extraSlots||0)+1;let req=S.purchaseRequests.find(r=>r.memberId===id&&r.status==='pending');if(req){req.status='approved';req.approvedAt=new Date().toISOString()}save();openDetail(id);render();alert('1枠提供しました。')}function fillTime(){let s=$('#addClosed select');let arr=[];for(let m=0;m+50<=1440;m+=50)arr.push(m);s.innerHTML=arr.map(m=>`<option value='${m}'>${fmtMin(m)}〜${fmtMin(m+50)}</option>`).join('');$('#addClosed input[type=date]').min=dk(new Date())}function openAdmin(){if($('#adminPass').value!==ADMIN){alert('管理者パスコードが違います。');return}$('#loginView').classList.add('hidden');$('#adminView').classList.remove('hidden');render()}document.addEventListener('click',e=>{let c=e.target.closest('[data-cancel]');if(c){let r=S.reservations.find(x=>x.id===c.dataset.cancel);if(r&&confirm(full(r.date,r.start)+' をキャンセルしますか？')){r.cancelled=true;r.cancelledAt=new Date().toISOString();save();render()}}let o=e.target.closest('[data-open]');if(o){S.closed=S.closed.filter(x=>x.id!==o.dataset.open);save();render()}let d=e.target.closest('[data-detail]');if(d)openDetail(d.dataset.detail);let g=e.target.closest('[data-grant]');if(g)grantSlot(g.dataset.grant);let cd=e.target.closest('[data-close-detail]');if(cd)$('#memberDetail').classList.add('hidden');if(e.target.id==='reset'){if(confirm('デモデータを初期化しますか？')){S=structuredClone(D);save();render()}}});$('#adminOpen').addEventListener('click',openAdmin);$('#addMember').addEventListener('submit',e=>{e.preventDefault();let f=new FormData(e.currentTarget),id=String(f.get('id')).trim().toUpperCase();if(S.members.some(m=>m.id===id)){alert('同じ会員番号があります。');return}S.members.push({id,pin:String(f.get('pin')).trim(),name:String(f.get('name')).trim(),plan:String(f.get('plan')).trim(),extraSlots:0});save();e.currentTarget.reset();render()});$('#addClosed').addEventListener('submit',e=>{e.preventDefault();let f=new FormData(e.currentTarget),date=f.get('date'),start=Number(f.get('start'));S.closed.push({id:'c_'+Date.now(),date,start,reason:f.get('reason')||''});save();e.currentTarget.reset();fillTime();render()});normalize();fillTime();
</script>
</body>
</html>
