<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>10分単位予約UIプレビュー｜行徳ジム24</title>
<style>
:root{--bg:#f7f3ec;--card:#fffaf2;--text:#20251f;--muted:#756c61;--line:#e5d8c6;--dark:#1f2a24;--accent:#f4b43f;--ok:#2f8a5b;--bad:#b34432;--blue:#3b82f6;--purple:#7c3aed;--shadow:0 18px 50px rgba(31,42,36,.12)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#fff8e9,var(--bg));font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic','Noto Sans JP',Meiryo,sans-serif;color:var(--text)}.wrap{width:min(1180px,calc(100% - 20px));margin:auto;padding:18px 0 100px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.brand{display:flex;gap:10px;align-items:center}.mark{display:grid;place-items:center;width:48px;height:48px;border-radius:16px;background:var(--accent);font-weight:950;font-size:22px}.brand p{margin:0;color:var(--muted);font-size:12px;font-weight:900}.brand h1{margin:0;font-size:22px}.ghost,.btn{border:0;border-radius:15px;min-height:44px;padding:0 14px;font-weight:950;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}.ghost{border:1px solid var(--line);background:#fffaf2;color:var(--dark)}.btn{background:linear-gradient(135deg,var(--accent),#ffd475);color:var(--dark);box-shadow:0 14px 24px rgba(200,125,21,.18)}.panel{border:1px solid var(--line);background:rgba(255,250,242,.96);box-shadow:var(--shadow);border-radius:22px;padding:18px;margin-bottom:16px}.eyebrow{margin:0 0 4px;color:var(--muted);font-size:12px;font-weight:950;letter-spacing:.08em}.panel h2{margin:0 0 8px}.small{color:var(--muted);font-size:13px;font-weight:800;line-height:1.7}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}.weeknav{display:flex;gap:8px}.legend{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;font-weight:900;color:var(--muted)}.legend span{display:inline-flex;align-items:center;gap:5px}.dot{width:10px;height:10px;border-radius:999px;display:inline-block}.dot.blue{background:var(--blue)}.dot.red{background:var(--bad)}.dot.gray{background:#8a8175}.dot.purple{background:var(--purple)}.cal{border:1px solid var(--line);border-radius:22px;background:#fffdf8;overflow:auto;box-shadow:inset 0 0 0 1px rgba(0,0,0,.02)}.cal-inner{min-width:830px;--axis:58px;--day:110px;--ppm:1px;--height:1140px}.cal-head{display:grid;grid-template-columns:var(--axis) repeat(7,var(--day));position:sticky;top:0;z-index:5;background:#fffaf2;border-bottom:1px solid var(--line)}.corner,.day-head{min-height:58px;padding:8px;border-right:1px solid var(--line);display:grid;place-items:center;text-align:center;font-weight:950}.day-head small{display:block;color:var(--muted);font-size:12px}.today{background:#fff3d5}.weekend{color:var(--bad)}.cal-body{display:grid;grid-template-columns:var(--axis) repeat(7,var(--day));height:var(--height);position:relative;background:repeating-linear-gradient(to bottom,transparent 0,transparent 59px,rgba(31,42,36,.09) 60px)}.axis{position:relative;border-right:1px solid var(--line);background:#fffdf8}.time-label{position:absolute;right:7px;transform:translateY(-50%);font-size:12px;font-weight:900;color:var(--muted)}.day-col{position:relative;border-right:1px solid var(--line);background:repeating-linear-gradient(to bottom,rgba(31,42,36,.025) 0,rgba(31,42,36,.025) 9px,transparent 10px,transparent 59px)}.tap-zone{position:absolute;left:0;right:0;height:10px;border:0;background:transparent;cursor:pointer}.tap-zone:hover{background:rgba(244,180,63,.16)}.event{position:absolute;left:5px;right:5px;border-radius:10px;padding:6px 7px;overflow:hidden;font-size:11px;line-height:1.28;color:#fff;box-shadow:0 6px 14px rgba(0,0,0,.12);z-index:2}.event strong{display:block;font-size:12px}.event.blue{background:var(--blue)}.event.red{background:var(--bad)}.event.gray{background:#8a8175}.event.purple{background:var(--purple)}.hint{position:absolute;left:8px;right:8px;top:10px;color:#b8aa99;font-size:11px;font-weight:900;text-align:center;pointer-events:none}.sheet{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#fffaf2;border-top:1px solid var(--line);box-shadow:0 -18px 48px rgba(31,42,36,.18);transform:translateY(105%);transition:.22s ease;border-radius:22px 22px 0 0}.sheet.open{transform:translateY(0)}.sheet-inner{width:min(720px,calc(100% - 24px));margin:auto;padding:18px 0 22px}.sheet h2{margin:4px 0 10px}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}label{font-size:13px;font-weight:950;color:var(--muted)}select,input{width:100%;margin-top:6px;border:1px solid #d8c8b4;border-radius:14px;padding:12px;background:#fffdf8;font:inherit}.sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.notice{margin-top:10px;padding:10px;border-radius:14px;background:#fff3d5;color:#744d08;font-weight:850;font-size:13px}.oknote{background:#eefaf2;color:#27533a}@media(max-width:640px){.top{align-items:flex-start}.cal{margin-left:-4px;margin-right:-4px}.cal-inner{min-width:790px;--axis:50px;--day:105px}.formgrid{grid-template-columns:1fr}.sheet-actions{grid-template-columns:1fr}.panel{padding:15px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand"><div class="mark">24</div><div><p>10分単位予約UIプレビュー</p><h1>行徳ジム24</h1></div></div>
    <a class="ghost" href="./">会員画面へ戻る</a>
  </header>
  <section class="panel">
    <div class="toolbar">
      <div><p class="eyebrow">予約カレンダー案</p><h2>空いている場所をタップして10分単位で予約</h2><p class="small">これは見た目確認用のデモです。予約ルール・Supabase・本番予約データは変更していません。</p></div>
      <div class="weeknav"><button class="ghost" id="prev">前の週</button><button class="ghost" id="today">今週</button><button class="btn" id="next">次の週</button></div>
    </div>
    <div class="legend"><span><i class="dot blue"></i>自分の予約</span><span><i class="dot gray"></i>予約済み</span><span><i class="dot red"></i>予約不可</span><span><i class="dot purple"></i>ヨガ個別予約</span></div>
  </section>
  <section class="cal" aria-label="10分単位予約カレンダー"><div class="cal-inner" id="calendar"></div></section>
</div>
<div class="sheet" id="sheet"><div class="sheet-inner"><p class="eyebrow">予約時間を選択</p><h2 id="sheetTitle">日時を選択してください</h2><div class="formgrid"><label>開始時間<select id="startSelect"></select></label><label>終了時間<input id="endTime" readonly></label></div><div id="message" class="notice">空いている場所をタップすると、近い10分単位の時間が入ります。</div><div class="sheet-actions"><button class="ghost" id="closeSheet">閉じる</button><button class="btn" id="reserveBtn">この時間で予約する</button></div></div></div>
<script>
(function(){
'use strict';
const ppm=1,startMin=300,endMin=1440,useMin=40,blockMin=50;let weekOffset=0,selectedDate='',selectedStart=600;
const pad=n=>String(n).padStart(2,'0'),fmt=m=>`${pad(Math.floor(m/60))}:${pad(m%60)}`,key=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`,wc='日月火水木金土';
const sample=[{d:0,s:620,e:670,t:'予約済み',c:'gray'},{d:1,s:750,e:820,t:'ヨガ個別予約',c:'purple'},{d:2,s:1080,e:1130,t:'自分の予約',c:'blue'},{d:3,s:1210,e:1310,t:'通常ヨガ',c:'red'},{d:5,s:540,e:610,t:'清掃',c:'red'},{d:6,s:1180,e:1230,t:'予約済み',c:'gray'}];
function weekStart(){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-d.getDay()+weekOffset*7);return d}
function days(){const s=weekStart(),a=[];for(let i=0;i<7;i++){const d=new Date(s);d.setDate(s.getDate()+i);a.push(d)}return a}
function labels(){let h='';for(let m=startMin;m<=endMin;m+=60)h+=`<div class="time-label" style="top:${(m-startMin)*ppm}px">${fmt(m)}</div>`;return h}
function dayHead(d){const k=key(d),tk=key(new Date()),w=d.getDay();return `<div class="day-head ${k===tk?'today':''} ${w===0||w===6?'weekend':''}">${d.getMonth()+1}/${d.getDate()}<small>${k===tk?'今日':wc[w]}</small></div>`}
function isBlocked(dayIndex,s){return sample.some(x=>x.d===dayIndex&&s<x.e&&x.s<s+blockMin)}
function render(){const ds=days();let heads=ds.map(dayHead).join(''),cols=ds.map((d,i)=>{let zones='',events='',k=key(d);for(let m=startMin;m<endMin;m+=10){zones+=`<button class="tap-zone" data-date="${k}" data-day="${i}" data-start="${m}" style="top:${(m-startMin)*ppm}px" title="${fmt(m)}"></button>`}sample.filter(x=>x.d===i).forEach(x=>{events+=`<div class="event ${x.c}" style="top:${(x.s-startMin)*ppm}px;height:${Math.max(32,(x.e-x.s)*ppm)}px"><strong>${fmt(x.s)}〜${fmt(x.e)}</strong>${x.t}</div>`});return `<div class="day-col"><div class="hint">空白をタップ</div>${zones}${events}</div>`}).join('');document.getElementById('calendar').innerHTML=`<div class="cal-head"><div class="corner">時間</div>${heads}</div><div class="cal-body"><div class="axis">${labels()}</div>${cols}</div>`}
function fillSelect(dayIndex){const sel=document.getElementById('startSelect');let html='';for(let m=startMin;m+useMin<=endMin;m+=10){html+=`<option value="${m}" ${m===selectedStart?'selected':''} ${isBlocked(dayIndex,m)?'disabled':''}>${fmt(m)}</option>`}sel.innerHTML=html;updateEnd()}
function updateEnd(){const s=Number(document.getElementById('startSelect').value||selectedStart);document.getElementById('endTime').value=fmt(s+useMin);document.getElementById('message').textContent='このUIでは開始時間だけ10分単位で選び、終了は自動で40分後にします。';}
document.addEventListener('click',e=>{const z=e.target.closest('.tap-zone');if(!z)return;selectedDate=z.dataset.date;selectedStart=Number(z.dataset.start);document.getElementById('sheetTitle').textContent=`${selectedDate} ${fmt(selectedStart)}〜${fmt(selectedStart+useMin)}`;fillSelect(Number(z.dataset.day));document.getElementById('sheet').classList.add('open')});
document.getElementById('startSelect').addEventListener('change',e=>{selectedStart=Number(e.target.value);updateEnd()});
document.getElementById('closeSheet').onclick=()=>document.getElementById('sheet').classList.remove('open');document.getElementById('reserveBtn').onclick=()=>{document.getElementById('message').className='notice oknote';document.getElementById('message').textContent='ここで本番なら既存の予約確認ダイアログへ進みます。今回はプレビューなので保存しません。'};
document.getElementById('prev').onclick=()=>{weekOffset--;render()};document.getElementById('today').onclick=()=>{weekOffset=0;render()};document.getElementById('next').onclick=()=>{weekOffset++;render()};render();
})();
</script>
</body>
</html>
